name: Deploy reports to Pages

on:
  workflow_run:
    workflows: ["Java CI"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Télécharger coverage-report
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          path: coverage-artifact

      - name: Télécharger junit-report
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: junit-report
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          path: junit-artifact

      - name: Vérifier les artifacts
        if: github.event_name == 'workflow_run'
        run: |
          echo "=== coverage-artifact ==="
          ls -R coverage-artifact || true
          echo ""
          echo "=== junit-artifact ==="
          ls -R junit-artifact || true

      - name: Checkout pour lancement manuel
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Préparer le site
        shell: bash
        run: |
          mkdir -p site
          mkdir -p site/jacoco
          mkdir -p site/junit

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ -d coverage-artifact/report ]; then
              cp -r coverage-artifact/report/. site/jacoco/
            fi
            if [ -d junit-artifact ]; then
              cp -r junit-artifact/. site/junit/ || true
            fi
          else
            if [ -d report ]; then
              cp -r report/. site/jacoco/
            fi
            if [ -d junit-report ]; then
              cp -r junit-report/. site/junit/ || true
            fi
          fi

          touch site/.nojekyll

          {
            echo '<!DOCTYPE html>'
            echo '<html lang="fr">'
            echo '<head>'
            echo '  <meta charset="UTF-8">'
            echo '  <meta name="viewport" content="width=device-width, initial-scale=1.0">'
            echo '  <title>Rapports CI</title>'
            echo '  <style>'
            echo '    body { font-family: Arial, sans-serif; margin: 40px; background: #f7f8fa; color: #222; }'
            echo '    .container { max-width: 900px; margin: auto; }'
            echo '    .card { background: white; border-radius: 14px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }'
            echo '    h1, h2 { margin-top: 0; }'
            echo '    a { color: #0366d6; text-decoration: none; }'
            echo '    ul { line-height: 1.8; }'
            echo '  </style>'
            echo '</head>'
            echo '<body>'
            echo '  <div class="container">'
            echo '    <div class="card">'
            echo '      <h1>Rapports du pipeline</h1>'
            echo '      <p>Cette page regroupe le rapport de couverture JaCoCo et les résultats JUnit générés par GitHub Actions.</p>'
            echo '    </div>'
            echo '    <div class="card">'
            echo '      <h2>Rapport JaCoCo</h2>'
            echo '      <p><a href="./jacoco/index.html">Ouvrir le rapport de couverture</a></p>'
            echo '      <p><a href="./jacoco/index-summary.html">Ouvrir le résumé de couverture</a></p>'
            echo '    </div>'
            echo '    <div class="card">'
            echo '      <h2>Résultats JUnit</h2>'
            echo '      <p>Les résultats détaillés restent mieux visibles dans l’onglet Actions de GitHub, mais les fichiers XML publiés sont listés ci-dessous.</p>'
            echo '      <ul>'
          } > site/index.html

          find site/junit -type f -name "*.xml" | sort | while IFS= read -r file; do
            rel="${file#site/}"
            base="$(basename "$file")"
            echo "        <li><a href=\"./$rel\">$base</a></li>" >> site/index.html
          done

          {
            echo '      </ul>'
            echo '    </div>'
            echo '  </div>'
            echo '</body>'
            echo '</html>'
          } >> site/index.html

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Uploader l'artifact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
