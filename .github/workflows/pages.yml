name: Deploy report to Pages

on:
  workflow_run:
    workflows: ["Java CI"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: Télécharger l'artifact du rapport
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          path: report-artifact

      - name: Vérifier les fichiers téléchargés
        run: |
          echo "Contenu téléchargé :"
          ls -R report-artifact

      - name: Préparer le site
        run: |
          mkdir -p site
          cp -r report-artifact/report/* site/
          touch site/.nojekyll

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Uploader l'artifact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
